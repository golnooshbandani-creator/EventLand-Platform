<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>رویدادلند — ثبت‌نام</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<header class="navbar">
  <div class="container nav-inner">

    <div class="logo"><h2>رویدادلند</h2></div>

    <input type="checkbox" id="hamburger-toggle">
    <label for="hamburger-toggle" class="hamburger-menu">☰</label>

    <nav class="nav-links">
      <a href="index.html">خانه</a>
      <a href="events.html">رویدادها</a>
      <a href="about.html">درباره ما</a>
      <a href="survey.html">نظرسنجی</a>
      <a href="login.html" class="btn-ghost">ورود</a>
      <a href="register.html" class="cta-primary active">ثبت‌نام</a>
    </nav>

  </div>
</header>


<main class="container">
  <section class="section">
    <h1 class="section-title">ایجاد حساب کاربری جدید</h1>
    <div class="form-container">
      <form>
        <div class="form-group">
          <label for="fullname">نام و نام خانوادگی</label>
          <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="form-group">
          <label for="email">ایمیل</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">رمز عبور</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">تکرار رمز عبور</label>
          <input type="password" id="confirm-password" name="confirm-password" required>
        </div>
        <button type="submit" class="cta-primary" style="width: 100%;">ثبت‌نام</button>
        <p class="form-switch">قبلاً ثبت‌نام کرده‌اید؟ <a href="login.html">وارد شوید</a></p>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
    <div>© ۱۴۰۴ - همه حقوق برای رویدادلند محفوظ است.</div>
    <div style="direction: ltr;">info@royaadeland.ir</div>
  </div>
</footer>

</body>
</html>
